<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0F"/>
      <stop offset="100%" style="stop-color:#050505"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFE600"/>
      <stop offset="100%" style="stop-color:#FF9500"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E5FF"/>
      <stop offset="100%" style="stop-color:#0088FF"/>
    </linearGradient>
    <linearGradient id="wave3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF003C"/>
      <stop offset="100%" style="stop-color:#FF0066"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  
  <!-- Sound waves -->
  <g transform="translate(256, 256)">
    <!-- Yellow wave -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#wave1)" stroke-width="12" opacity="0.9"/>
    <!-- Cyan wave -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#wave2)" stroke-width="10" opacity="0.8"/>
    <!-- Red wave -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#wave3)" stroke-width="8" opacity="0.7"/>
    
    <!-- Center play button -->
    <circle cx="0" cy="0" r="45" fill="#FFE600"/>
    <polygon points="10,-20 10,20 35,0" fill="#050505"/>
  </g>
  
  <!-- Text "S" -->
  <text x="256" y="450" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="white" text-anchor="middle">
    <tspan fill="#FFE600">SALSA</tspan><tspan fill="#00E5FF">MIX</tspan>
  </text>
</svg>
