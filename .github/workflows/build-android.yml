name: Build Android

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'
        cache-dependency-path: frontend/yarn.lock

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install frontend dependencies
      run: |
        cd frontend
        yarn install --frozen-lockfile

    - name: Build React app
      run: |
        cd frontend
        CI=false yarn build

    - name: Sync Capacitor
      run: |
        cd frontend
        npx cap sync android

    - name: Make gradlew executable
      run: chmod +x frontend/android/gradlew

    - name: Build Debug APK
      run: |
        cd frontend/android
        ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: SalsaMixLive-debug
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Release APK (unsigned)
      run: |
        cd frontend/android
        ./gradlew assembleRelease

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: SalsaMixLive-release-unsigned
        path: frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30

    - name: Build Release App Bundle
      run: |
        cd frontend/android
        ./gradlew bundleRelease

    - name: Upload Release App Bundle
      uses: actions/upload-artifact@v4
      with:
        name: SalsaMixLive-release-bundle
        path: frontend/android/app/build/outputs/bundle/release/app-release.aab
        retention-days: 30
