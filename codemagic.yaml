workflows:
  android-build:
    name: Build Android APK
    max_build_duration: 30
    instance_type: mac_mini_m1
    
    environment:
      java: 17
      node: 20
      
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install -g yarn
          yarn install
          
      - name: Build web app
        script: |
          cd frontend
          yarn build
          
      - name: Sync Capacitor
        script: |
          cd frontend
          npx cap sync android
          
      - name: Set Android SDK
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > frontend/android/local.properties
          
      - name: Build Debug APK
        script: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Build Release APK
        script: |
          cd frontend/android
          ./gradlew assembleRelease
          
    artifacts:
      - frontend/android/app/build/outputs/apk/debug/*.apk
      - frontend/android/app/build/outputs/apk/release/*.apk
      
    publishing:
      email:
        recipients:
          - tu-email@ejemplo.com  # Cambia esto por tu email
        notify:
          success: true
          failure: true
